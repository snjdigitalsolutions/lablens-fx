<?xml version="1.0" encoding="UTF-8"?>
<svg width="360" height="230" viewBox="0 0 360 230" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">

  <!-- Background -->
  <rect width="360" height="230" fill="#1e1e2e" rx="8"/>

  <!-- Title -->
  <text x="180" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#cdd6f4">Database Schema</text>

  <!-- compute_resource table -->
  <rect x="60" y="50" width="240" height="160" rx="6" fill="#313244" stroke="#fab387" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="60" y="50" width="240" height="28" rx="6" fill="#fab387"/>
  <rect x="60" y="66" width="240" height="12" fill="#fab387"/>
  <text x="180" y="69" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e1e2e">compute_resource</text>

  <!-- Divider after header -->
  <line x1="60" y1="78" x2="300" y2="78" stroke="#585b70" stroke-width="1"/>

  <!-- PK row -->
  <text x="80" y="96" font-size="11" fill="#f9e2af">PK  id</text>
  <text x="200" y="96" font-size="11" fill="#a6adc8">BIGINT AUTO_INCREMENT</text>

  <!-- Divider after PK -->
  <line x1="60" y1="103" x2="300" y2="103" stroke="#585b70" stroke-width="1"/>

  <!-- Columns -->
  <text x="80" y="120" font-size="11" fill="#a6adc8">ipaddress</text>
  <text x="200" y="120" font-size="11" fill="#6c7086">VARCHAR(15)</text>

  <text x="80" y="138" font-size="11" fill="#a6adc8">os</text>
  <text x="200" y="138" font-size="11" fill="#6c7086">VARCHAR(128)</text>

  <text x="80" y="156" font-size="11" fill="#a6adc8">description</text>
  <text x="200" y="156" font-size="11" fill="#6c7086">VARCHAR(256)</text>

  <text x="80" y="174" font-size="11" fill="#a6adc8">hostname</text>
  <text x="200" y="174" font-size="11" fill="#6c7086">VARCHAR(255)</text>

  <!-- Divider before migrations -->
  <line x1="60" y1="182" x2="300" y2="182" stroke="#585b70" stroke-width="1"/>

  <!-- Migration notes -->
  <text x="80" y="194" font-size="9" fill="#45475a">V1__create_compute_resource_table</text>
  <text x="80" y="205" font-size="9" fill="#45475a">V2__add_hostname_to_compute_resource</text>
  <text x="80" y="216" font-size="9" fill="#45475a">V3__change_compute_resource_id_to_bigint</text>

</svg>
