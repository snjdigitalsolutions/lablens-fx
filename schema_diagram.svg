<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="415" viewBox="0 0 700 415"
     font-family="Arial, sans-serif">

  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <!-- Clip paths keep row fills inside rounded table borders -->
    <clipPath id="clip-cr">
      <rect x="40" y="60" width="250" height="198" rx="6"/>
    </clipPath>
    <clipPath id="clip-cp">
      <rect x="358" y="60" width="296" height="150" rx="6"/>
    </clipPath>
    <clipPath id="clip-s">
      <rect x="358" y="238" width="270" height="126" rx="6"/>
    </clipPath>
    <!-- Arrowhead marker -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="700" height="415" fill="#edf2f7"/>

  <!-- ── Title ── -->
  <text x="350" y="33" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">
    lablens — Database Entity Diagram
  </text>
  <text x="350" y="50" text-anchor="middle" font-size="11" fill="#64748b">
    Flyway migrations V1 – V8
  </text>


  <!-- ══════════════════════════════════════
       TABLE: compute_resource  (x=40, y=60)
       7 rows  →  height = 30 + 7×24 = 198
       ══════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <!-- base white fill -->
    <rect x="40" y="60" width="250" height="198" rx="6" fill="white"/>

    <!-- row fills (clipped) -->
    <g clip-path="url(#clip-cr)">
      <!-- header -->
      <rect x="40" y="60"  width="250" height="30"  fill="#1e3a5f"/>
      <!-- PK row -->
      <rect x="40" y="90"  width="250" height="24"  fill="#fef3c7"/>
      <!-- alternating even rows -->
      <rect x="40" y="138" width="250" height="24"  fill="#f8fafc"/>
      <rect x="40" y="186" width="250" height="24"  fill="#f8fafc"/>
      <rect x="40" y="234" width="250" height="24"  fill="#f8fafc"/>
      <!-- dividers -->
      <line x1="40" y1="90"  x2="290" y2="90"  stroke="#e2e8f0" stroke-width="1"/>
      <line x1="40" y1="114" x2="290" y2="114" stroke="#e2e8f0" stroke-width="1"/>
      <line x1="40" y1="138" x2="290" y2="138" stroke="#e2e8f0" stroke-width="1"/>
      <line x1="40" y1="162" x2="290" y2="162" stroke="#e2e8f0" stroke-width="1"/>
      <line x1="40" y1="186" x2="290" y2="186" stroke="#e2e8f0" stroke-width="1"/>
      <line x1="40" y1="210" x2="290" y2="210" stroke="#e2e8f0" stroke-width="1"/>
      <line x1="40" y1="234" x2="290" y2="234" stroke="#e2e8f0" stroke-width="1"/>
    </g>
    <!-- outer border drawn on top -->
    <rect x="40" y="60" width="250" height="198" rx="6" fill="none" stroke="#475569" stroke-width="1.5"/>
  </g>

  <!-- compute_resource: text -->
  <text x="165" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="white">compute_resource</text>

  <!-- id PK -->
  <text x="54"  y="107" font-size="10" font-weight="bold" fill="#92400e" font-family="monospace">PK</text>
  <text x="78"  y="107" font-size="12" fill="#1e293b">id</text>
  <text x="283" y="107" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">BIGINT</text>

  <!-- ipaddress -->
  <text x="54"  y="131" font-size="12" fill="#1e293b">ipaddress</text>
  <text x="283" y="131" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">VARCHAR(15)</text>

  <!-- os -->
  <text x="54"  y="155" font-size="12" fill="#1e293b">os</text>
  <text x="283" y="155" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">VARCHAR(128)</text>

  <!-- description -->
  <text x="54"  y="179" font-size="12" fill="#1e293b">description</text>
  <text x="283" y="179" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">VARCHAR(256)</text>

  <!-- hostname -->
  <text x="54"  y="203" font-size="12" fill="#1e293b">hostname</text>
  <text x="283" y="203" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">VARCHAR(255)</text>

  <!-- sshport -->
  <text x="54"  y="227" font-size="12" fill="#1e293b">sshport</text>
  <text x="283" y="227" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">INT</text>

  <!-- sshcom -->
  <text x="54"  y="251" font-size="12" fill="#1e293b">sshcom</text>
  <text x="283" y="251" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">INT NOT NULL</text>


  <!-- ══════════════════════════════════════
       TABLE: configuration_path  (x=358, y=60)
       5 rows  →  height = 30 + 5×24 = 150
       ══════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="358" y="60" width="296" height="150" rx="6" fill="white"/>

    <g clip-path="url(#clip-cp)">
      <!-- header -->
      <rect x="358" y="60"  width="296" height="30"  fill="#1e3a5f"/>
      <!-- PK row -->
      <rect x="358" y="90"  width="296" height="24"  fill="#fef3c7"/>
      <!-- FK row -->
      <rect x="358" y="114" width="296" height="24"  fill="#dbeafe"/>
      <!-- alternating even rows -->
      <rect x="358" y="162" width="296" height="24"  fill="#f8fafc"/>
      <!-- dividers -->
      <line x1="358" y1="90"  x2="654" y2="90"  stroke="#e2e8f0" stroke-width="1"/>
      <line x1="358" y1="114" x2="654" y2="114" stroke="#e2e8f0" stroke-width="1"/>
      <line x1="358" y1="138" x2="654" y2="138" stroke="#e2e8f0" stroke-width="1"/>
      <line x1="358" y1="162" x2="654" y2="162" stroke="#e2e8f0" stroke-width="1"/>
      <line x1="358" y1="186" x2="654" y2="186" stroke="#e2e8f0" stroke-width="1"/>
    </g>
    <rect x="358" y="60" width="296" height="150" rx="6" fill="none" stroke="#475569" stroke-width="1.5"/>
  </g>

  <!-- configuration_path: text -->
  <text x="506" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="white">configuration_path</text>

  <!-- id PK -->
  <text x="372" y="107" font-size="10" font-weight="bold" fill="#92400e" font-family="monospace">PK</text>
  <text x="396" y="107" font-size="12" fill="#1e293b">id</text>
  <text x="647" y="107" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">INT</text>

  <!-- compute_resource_id FK -->
  <text x="372" y="131" font-size="10" font-weight="bold" fill="#1d4ed8" font-family="monospace">FK</text>
  <text x="396" y="131" font-size="12" fill="#1e293b">compute_resource_id</text>
  <text x="647" y="131" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">INT</text>

  <!-- configuration_path (column) -->
  <text x="372" y="155" font-size="12" fill="#1e293b">configuration_path</text>
  <text x="647" y="155" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">VARCHAR(256)</text>

  <!-- requires_elevation -->
  <text x="372" y="179" font-size="12" fill="#1e293b">requires_elevation</text>
  <text x="647" y="179" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">INT</text>

  <!-- elevation_check_complete -->
  <text x="372" y="203" font-size="12" fill="#1e293b">elevation_check_complete</text>
  <text x="647" y="203" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">INT</text>


  <!-- ══════════════════════════════════════
       TABLE: setting  (x=358, y=238)
       4 rows  →  height = 30 + 4×24 = 126
       ══════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="358" y="238" width="270" height="126" rx="6" fill="white"/>

    <g clip-path="url(#clip-s)">
      <!-- header -->
      <rect x="358" y="238" width="270" height="30"  fill="#1e3a5f"/>
      <!-- PK row -->
      <rect x="358" y="268" width="270" height="24"  fill="#fef3c7"/>
      <!-- alternating -->
      <rect x="358" y="316" width="270" height="24"  fill="#f8fafc"/>
      <!-- dividers -->
      <line x1="358" y1="268" x2="628" y2="268" stroke="#e2e8f0" stroke-width="1"/>
      <line x1="358" y1="292" x2="628" y2="292" stroke="#e2e8f0" stroke-width="1"/>
      <line x1="358" y1="316" x2="628" y2="316" stroke="#e2e8f0" stroke-width="1"/>
      <line x1="358" y1="340" x2="628" y2="340" stroke="#e2e8f0" stroke-width="1"/>
    </g>
    <rect x="358" y="238" width="270" height="126" rx="6" fill="none" stroke="#475569" stroke-width="1.5"/>
  </g>

  <!-- setting: text -->
  <text x="493" y="258" text-anchor="middle" font-size="13" font-weight="bold" fill="white">setting</text>

  <!-- id PK -->
  <text x="372" y="285" font-size="10" font-weight="bold" fill="#92400e" font-family="monospace">PK</text>
  <text x="396" y="285" font-size="12" fill="#1e293b">id</text>
  <text x="621" y="285" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">INT</text>

  <!-- setting_name -->
  <text x="372" y="309" font-size="12" fill="#1e293b">setting_name</text>
  <text x="621" y="309" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">VARCHAR(128)</text>

  <!-- boolean_value -->
  <text x="372" y="333" font-size="12" fill="#1e293b">boolean_value</text>
  <text x="621" y="333" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">INT</text>

  <!-- string_value -->
  <text x="372" y="357" font-size="12" fill="#1e293b">string_value</text>
  <text x="621" y="357" text-anchor="end" font-size="11" fill="#64748b" font-family="monospace">VARCHAR(128)</text>


  <!-- ══════════════════════════════════════
       RELATIONSHIP: compute_resource (1) → configuration_path (N)
       Elbow: right of CR id row → left of CP compute_resource_id row
       ══════════════════════════════════════ -->

  <!-- Elbow connector line -->
  <polyline points="290,102 324,102 324,126 358,126"
            fill="none" stroke="#3b82f6" stroke-width="1.8"
            stroke-dasharray="none"
            marker-end="url(#arrow)"/>

  <!-- "1" cardinality at compute_resource end -->
  <!-- single tick mark -->
  <line x1="295" y1="96" x2="295" y2="108" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="298" y="98" font-size="11" font-weight="bold" fill="#3b82f6">1</text>

  <!-- crow's foot at configuration_path end: 3 lines fanning left -->
  <line x1="358" y1="126" x2="346" y2="120" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="358" y1="126" x2="346" y2="126" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="358" y1="126" x2="346" y2="132" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="336" y="119" font-size="11" font-weight="bold" fill="#3b82f6">N</text>


  <!-- ── Legend ── -->
  <g transform="translate(40, 290)">
    <rect x="0" y="0" width="200" height="88" rx="5" fill="white" stroke="#cbd5e1" stroke-width="1"
          filter="url(#shadow)"/>
    <text x="100" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Legend</text>
    <line x1="10" y1="24" x2="190" y2="24" stroke="#e2e8f0" stroke-width="1"/>

    <!-- PK swatch -->
    <rect x="12" y="30" width="14" height="14" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
    <text x="32" y="41" font-size="11" fill="#1e293b">Primary Key</text>

    <!-- FK swatch -->
    <rect x="12" y="50" width="14" height="14" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
    <text x="32" y="61" font-size="11" fill="#1e293b">Foreign Key</text>

    <!-- Relationship swatch -->
    <line x1="12" y1="78" x2="26" y2="78" stroke="#3b82f6" stroke-width="1.8"/>
    <text x="32" y="81" font-size="11" fill="#1e293b">1-to-many relationship</text>
  </g>

</svg>
