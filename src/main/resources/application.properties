spring.application.name=lablens-fx

# File-based H2 datasource
spring.datasource.url=jdbc:h2:file:./data/lablens
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always

# Enable/disable flyway entirely
spring.flyway.enabled=true

# Override migration file location (default is classpath:db/migration)
spring.flyway.locations=classpath:db/migration

# Set the schema to migrate
spring.flyway.schemas=public

# Prefix/suffix/separator for migration files (defaults shown)
spring.flyway.sql-migration-prefix=V
spring.flyway.sql-migration-separator=__
spring.flyway.sql-migration-suffixes=.sql

# Useful in dev ? allows migrations on a non-empty schema
spring.flyway.baseline-on-migrate=true
